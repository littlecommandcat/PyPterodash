<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="shop_title"></title>
    <link rel="stylesheet" href="/static/style/{{ theme }}/shop.css">
</head>

<div id="custom-modal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
        <h3 id="modal-title">Notification</h3>
        <p id="modal-message">Message content...</p>
        <div class="modal-actions">
            <button id="modal-cancel-btn" class="modal-btn btn-secondary" style="display: none;">Cancel</button>
            <button id="modal-confirm-btn" class="modal-btn btn-primary">OK</button>
        </div>
    </div>
</div>
<div id="loading-overlay" class="loading-overlay" style="display: none;">
    <div class="spinner-box">
        <div class="spinner"></div>
        <p class="loading-text" data-i18n="loading_text">Processing, please wait...</p>
    </div>
</div>

<body>

    <div class="header-section">
        <h1 data-i18n="shop_header"></h1>
        <div class="header-controls">
            <select id="language-switcher" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="zh-TW">繁體中文</option>
            </select>
            <a href="/dashboard" class="back-btn" data-i18n="back_btn"></a>
        </div>
    </div>

    <div class="wallet-card">
        <div>
            <div style="font-size: 16px; opacity: 0.9;" data-i18n="wallet_title"></div>
            <div class="wallet-balance">💲 {{ user.coin }} <span style="font-size: 16px; color: white;">Coins</span></div>
        </div>
        <div class="current-stats">
            <strong data-i18n="quota_title"></strong><br>
            <span data-i18n="quota_ram"></span>{{ user.max_memory }} mb<br>
            <span data-i18n="quota_cpu"></span>{{ user.max_cpu }} %<br>
            <span data-i18n="quota_disk"></span>{{ user.max_disk }} mb
        </div>
    </div>

    <h2 style="margin-bottom: 20px;" data-i18n="select_item_title"></h2>

    <div class="shop-grid">
        
        <div class="shop-card">
            <div class="item-icon"></div>
            <div class="item-title" data-i18n="item_ram_title"></div>
            <div class="item-desc" data-i18n="item_ram_desc"></div>
            <div class="item-price">{{ ram }} <span data-i18n="price_ram_unit"></span></div>
            <div>
                <label style="font-size: 12px; color: #7f8c8d; display:block; margin-bottom:5px;" data-i18n="qty_ram_label"></label>
                <input type="number" id="qty-ram" class="quantity-input" value="1" min="1" max="99">
            </div>
            <button class="buy-btn" onclick="processPurchase('ram')" data-i18n="buy_btn"></button>
        </div>

        <div class="shop-card">
            <div class="item-icon"></div>
            <div class="item-title" data-i18n="item_cpu_title"></div>
            <div class="item-desc" data-i18n="item_cpu_desc"></div>
            <div class="item-price">{{ cpu }} <span data-i18n="price_cpu_unit"></span></div>
            <div>
                <label style="font-size: 12px; color: #7f8c8d; display:block; margin-bottom:5px;" data-i18n="qty_cpu_label"></label>
                <input type="number" id="qty-cpu" class="quantity-input" value="1" min="1" max="99">
            </div>
            <button class="buy-btn" onclick="processPurchase('cpu')" data-i18n="buy_btn"></button>
        </div>

        <div class="shop-card">
            <div class="item-icon"></div>
            <div class="item-title" data-i18n="item_disk_title"></div>
            <div class="item-desc" data-i18n="item_disk_desc"></div>
            <div class="item-price">{{ disk }} <span data-i18n="price_disk_unit"></span></div>
            <div>
                <label style="font-size: 12px; color: #7f8c8d; display:block; margin-bottom:5px;" data-i18n="qty_disk_label"></label>
                <input type="number" id="qty-disk" class="quantity-input" value="1" min="1" max="99">
            </div>
            <button class="buy-btn" onclick="processPurchase('disk')" data-i18n="buy_btn"></button>
        </div>

    </div>

    <script src="/static/script/script.js"></script>
</body>
</html>
